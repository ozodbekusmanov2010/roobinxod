<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roobinhod</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="conteiner">
        <header>
            <nav>
                <div class="header__logo">
                    <img src="Frame (6).png" alt="">
                </div>
                <ul class="nav__links">
                    <li>
                        <a class="nav__links--link" href="#">Products</a>
                    </li>
                    <li>
                        <a class="nav__links--link" href="#">Learn</a>
                    </li>
                    <li>
                        <a class="nav__links--link" href="#">Support</a>
                    </li>
                    <li>
                        <a class="nav__links--link" href="#">Who we are</a>
                    </li>
                </ul>
            </nav>
            <div class="header__btns">
                <button class="header__btns--btn">Log In</button>
                <button class="header__btns--btn1">Sign Up</button>
            </div>
            <i class="fa-solid fa-bars"></i>
        </header>
    </div>
    <div class="hero">
        <div class="hero__text">
            <h2 class="hero__text--title">Investing for Everyone</h2>
            <p class="hero__text--subtitle">Commission-free investing, plus the tools you need to put your money in
                motion. Sign up and get your first stock for free. Certain limitations apply.</p>
            <button class="hero__text--btn">Sign Up</button>
        </div>
        <div class="hero__img">
            <img class="hero__img--img" src="Frame (7).png" alt="">
        </div>
    </div>
    <div class="hero__vorian">
        <div class="hero__vorian--img">
            <img class="hero__vorian--img--img" src="ef7d2895428b9766f449b444ad76ad5305eded7a.jpg" alt="">
        </div>
        <div class="hero__vorian--text">
            <h1 class="hero__vorian--title">We are all investors.</h1>
            <b class="hero__vorian--subtitle">See the campaign →</b>
        </div>
    </div>
</body>

</html>
